# @package _global_

defaults:
  - /habitat_baselines: habitat_baselines_rl_config_base
  - /benchmark/nav/objectnav: objectnav_hm3d
  - /habitat/task/lab_sensors:
      - base_explorer
      - compass_sensor
      - gps_sensor
      - heading_sensor
      - frontier_sensor
      - instance_imagegoal_sensor
  - /habitat/task/measurements:
    - frontier_exploration_map
    - traveled_stairs
    - distractor_success
  - /habitat_baselines/rl/policy: vlfm_policy
  - _self_

habitat:
 
  dataset:
    scenes_dir: data/scene_datasets/hm3d/val/
    type: InstanceUncertaintyLanguageDataset-v1  # definition of the CoIN-Bench task
    data_path: CoIN-Bench/{split}/{split}.json.gz # CoIN-Bench dataset

  task:
    type: InstanceUncertaintyLanguageTask-v1
    measurements:
      distance_to_goal: 
        distance_to: VIEW_POINTS
      success:
          success_distance: 1.0

    success_reward: 2.5
    slack_reward: -1e-3
    lab_sensors:
      base_explorer:
        turn_angle: 30

  simulator:
    turn_angle: 30
    tilt_angle: 30
    action_space_config: "v1"
    agents:
      main_agent:
        sim_sensors:
          depth_sensor:
            width: 512
            height: 512
            min_depth: 0.0
            max_depth: 5.0
            position: [0, 1.31, 0]
          rgb_sensor:
            width: 512
            height: 512
            position: [0, 1.31, 0]

        height: 1.41
        radius: 0.17
    habitat_sim_v0:
      gpu_device_id: 0
      allow_sliding: True


  #### vlfm config
  environment:
    iterator_options:
      max_scene_repeat_steps: 50000
    max_episode_steps: 1000

habitat_baselines:
  evaluate: True
  eval_ckpt_path_dir: data/dummy_policy.pth
  num_environments: 1
  load_resume_state_config: False

  torch_gpu_id: 0
  tensorboard_dir: "tb"
  video_dir: "video_dir"
  test_episode_count: -1
  checkpoint_folder: "data/new_checkpoints"
  trainer_name: "vlfm"
  num_updates: 270000
  log_interval: 10
  num_checkpoints: 100
  # Force PyTorch to be single threaded as
  # this improves performance considerably
  force_torch_single_threaded: True

  video_fps: 5
  eval:
    split: "val_unseen"
    # video_option: ['disk'] # uncomment this to generate videos

  rl:

    policy:
      name: "HabitatITMPolicyV2"
      task_type: "coin"
      pbp:
        trigger_step: 700
        enable_sufficient_exploration_trigger: false
        sufficient_exp_trigger_threshold: 0.6
        sufficient_exp_cell_size: 0.5
        min_num_instances_for_pbp_trigger: 5
        hard_tss_threshold_for_pbp_trigger: 0 # Set to zero to disable hard TSS-based trigger.
        consecutive_steps_for_pbp_trigger: 10
        instance_confirming_additional_steps: 20 # Extra confirmation steps before counting a newly seen instance as mature for PBP trigger.
        max_depth: 10
        max_stuck_count: 20
        max_same_property_streak: 5 # Stop PBP when the same discriminative property keeps repeating too many times.
        timeout: 60
        final_verification_mode: "candidate_text_mode" # Only for logging.
        enable_NLI_based: false
        instance_grouping_method: "dense_half_image_text"
        enable_pbp_refinement: false
        pbp_refinement_thres: 0.9
        NLI_kmeans_modal: "image"
      shard_episode:
        # Optional episode sharding for evaluation
        shard_size: 0  # <= 0 disables sharding
        shard: 0       # 0-based shard index
      
      # Optional explicit episode selection for evaluation.
      # - If `episodes_to_run` is non-empty, ONLY those episode_id will run.
      # - `episodes_to_skip` always takes precedence (skips even if in `episodes_to_run`).
      episodes_to_run: []   # e.g., [1414, 438]
      episodes_to_skip: []

      explore_only: false
      goal_point_method: "goal_point_single"

      use_distance_value: False # legacy
      distance_threshold: 3.0 # legacy

      enable_loop_value: False
      loop_alpha: 0.02
      loop_determine_threshold: 0.9
      loop_blacklist_count_threshold: 5 # To determine whether the area is a loop, count consecutive number of tiems for (loop >= loop_determine_threshold).
      enable_rotate: false
      enable_multi_view: false
      enable_multi_view_optimization: false
      rotate_radius: 1.0
      robot_rotate_openness_threshold: 0.1
      num_angle_bin: 360
      save_panoramas: false
      save_logging_images: false
      panorama_output_dir: "panoramas"
      save_video: false
    ppo:
      # ppo params
      clip_param: 0.2
      ppo_epoch: 4
      num_mini_batch: 2
      value_loss_coef: 0.5
      entropy_coef: 0.01
      lr: 2.5e-4
      eps: 1e-5
      max_grad_norm: 0.2
      num_steps: 64
      use_gae: True
      gamma: 0.99
      tau: 0.95
      use_linear_clip_decay: False
      use_linear_lr_decay: False
      reward_window_size: 50

      use_normalized_advantage: False

      hidden_size: 512

    ddppo:
      sync_frac: 0.6
      # The PyTorch distributed backend to use
      distrib_backend: NCCL
      # Visual encoder backbone
      pretrained_weights: data/ddppo-models/gibson-2plus-resnet50.pth
      # Initialize with pretrained weights
      pretrained: False
      # Initialize just the visual encoder backbone with pretrained weights
      pretrained_encoder: False
      # Whether or not the visual encoder backbone will be trained.
      train_encoder: True
      # Whether or not to reset the critic linear layer
      reset_critic: False

      # Model parameters
      backbone: resnet50
      rnn_type: LSTM
      num_recurrent_layers: 2
